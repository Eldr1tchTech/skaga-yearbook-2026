<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skaga Yearbook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body>
    <header>
        <div class="header-inner">
            <div class="header-line"></div>
            <h1>Skaga <em>Yearbook</em></h1>
            <div class="header-line"></div>
        </div>
    </header>

    <main>
        <div id="tag-bar">
            <button class="tag selected" data-lang="en">English</button>
            <button class="tag" data-lang="de">Deutsch</button>
            <button class="tag" data-lang="it">Italiano</button>
            <button class="tag" data-lang="fr">Français</button>
        </div>

        <div id="viewer-wrap">
            <div id="loading-state">
                <span class="loading-dots">Loading<span>.</span><span>.</span><span>.</span></span>
            </div>
            <canvas id="pdf-canvas"></canvas>
        </div>

        <div id="controls">
            <button class="ctrl-btn" id="btn-prev" onclick="prevPage()" disabled>&#8592; Prev</button>
            <span id="page-info">
                <span id="page-num">—</span>
                <span class="page-sep">/</span>
                <span id="page-total">—</span>
            </span>
            <button class="ctrl-btn" id="btn-next" onclick="nextPage()" disabled>Next &#8594;</button>
        </div>
    </main>

    <footer>
        <span>Skaga &mdash; <em>Annual Yearbook</em></span>
    </footer>

    <script>
        // PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null;
        let pageNum = 1;
        let currentLang = 'en';
        let rendering = false;

        // Map language codes to PDF filenames in the pdfs/ folder
        // Only the English PDF exists in this repository, so all languages fall back to it.
        const pdfMap = {
            en: 'pdfs/yearbook_en.pdf',
            de: 'pdfs/yearbook_en.pdf',
            it: 'pdfs/yearbook_en.pdf',
            fr: 'pdfs/yearbook_en.pdf',
        };

        function setLoading(show) {
            document.getElementById('loading-state').style.display = show ? 'flex' : 'none';
            document.getElementById('pdf-canvas').style.opacity = show ? '0' : '1';
        }

        function updateControls() {
            document.getElementById('btn-prev').disabled = pageNum <= 1;
            document.getElementById('btn-next').disabled = !pdfDoc || pageNum >= pdfDoc.numPages;
            document.getElementById('page-num').textContent = pageNum;
            document.getElementById('page-total').textContent = pdfDoc ? pdfDoc.numPages : '—';
        }

        function renderPage(num) {
            if (!pdfDoc || rendering) return;
            rendering = true;
            setLoading(true);

            pdfDoc.getPage(num).then(page => {
                const canvas = document.getElementById('pdf-canvas');
                const ctx = canvas.getContext('2d');

                // Scale to fit the viewer width
                const viewerWrap = document.getElementById('viewer-wrap');
                const maxWidth = viewerWrap.clientWidth - 40;
                const baseViewport = page.getViewport({ scale: 1 });
                const scale = Math.min(maxWidth / baseViewport.width, 1.8);
                const viewport = page.getViewport({ scale });

                canvas.height = viewport.height;
                canvas.width = viewport.width;

                page.render({ canvasContext: ctx, viewport }).promise.then(() => {
                    rendering = false;
                    setLoading(false);
                    updateControls();
                });
            });
        }

        function loadPDF(lang) {
            const path = pdfMap[lang];
            setLoading(true);
            pageNum = 1;
            pdfDoc = null;
            updateControls();

            pdfjsLib.getDocument(path).promise.then(pdf => {
                pdfDoc = pdf;
                renderPage(pageNum);
            }).catch(err => {
                setLoading(false);
                document.getElementById('loading-state').innerHTML =
                    `<span style="color:#c0392b;">Could not load PDF.<br><small>${path}</small></span>`;
                document.getElementById('loading-state').style.display = 'flex';
                console.error(err);
            });
        }

        function nextPage() {
            if (pdfDoc && pageNum < pdfDoc.numPages) {
                pageNum++;
                renderPage(pageNum);
            }
        }

        function prevPage() {
            if (pageNum > 1) {
                pageNum--;
                renderPage(pageNum);
            }
        }

        // Language tag buttons
        document.querySelectorAll('.tag').forEach(btn => {
            btn.addEventListener('click', () => {
                const lang = btn.dataset.lang;
                if (lang === currentLang) return;
                currentLang = lang;

                document.querySelectorAll('.tag').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');

                loadPDF(lang);
            });
        });

        // Keyboard navigation
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') prevPage();
        });

        // Initial load
        loadPDF('en');
    </script>
</body>

</html>
