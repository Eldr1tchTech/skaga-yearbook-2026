<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Skaga Yearbook Translations</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<script>
    let pdfDoc = null;
    let pageNum = 1;

    pdfjsLib.getDocument("yearbook_en.pdf").promise.then(pdf => {
        pdfDoc = pdf;
        renderPage(pageNum);
    });

    function renderPage(num) {
        pdfDoc.getPage(num).then(page => {
            const canvas = document.getElementById("pdf-canvas");
            const ctx = canvas.getContext("2d");

            const viewport = page.getViewport({ scale: 1.5 });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            page.render({
                canvasContext: ctx,
                viewport: viewport
            });

            document.getElementById("page-num").textContent = num;
        });
    }

    function nextPage() {
        if (pageNum < pdfDoc.numPages) {
            pageNum++;
            renderPage(pageNum);
        }
    }

    function prevPage() {
        if (pageNum > 1) {
            pageNum--;
            renderPage(pageNum);
        }
    }
</script>

<body>
    <h1>Skaga Yearbook Translations</h1>
    <div id="tag-bar">
        <button class="tag" data-tag="english">English</button>
        <button class="tag" data-tag="german">German</button>
        <button class="tag" data-tag="italian">Italian</button>
        <button class="tag" data-tag="french">French</button>
    </div>
    <canvas id="pdf-canvas"></canvas>

    <div id="controls">
        <button onclick="prevPage()">Prev</button>
        <span id="page-num"></span>
        <button onclick="nextPage()">Next</button>
    </div>
</body>

</html>
